services:
  icecast:
    image: moul/icecast
    container_name: icecast
    ports:
      - "8001:8001"
    volumes:
      - ./icecast/icecast.xml:/etc/icecast2/icecast.xml:ro
      - ./icecast/logs:/usr/local/icecast/logs
      - ./icecast/web:/usr/share/icecast2/web:ro
      - ./icecast/admin:/usr/share/icecast2/admin:ro

  mpd:
    image: vimagick/mpd
    container_name: mpd
    depends_on:
      - icecast
    volumes:
      - ./mpd/start.sh:/start.sh:ro
      - ./mpd/mpd.conf:/etc/mpd.conf:ro
      - ./mpd/music:/music:ro
      - ./mpd/playlists:/playlists
      - ./mpd/data:/var/lib/mpd
    command: ["/start.sh"]
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: backend
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: ["npm", "run", "dev"]
    environment:
      ICECAST_URL: ${ICECAST_URL:-http://icecast:8001/status-json.xsl}
      MPD_HOST: ${MPD_HOST:-mpd}
      MPD_PORT: ${MPD_PORT:-6600}
      PORT: ${PORT:-3001}
    ports:
      - "3001:3001"
    depends_on:
      - icecast

  frontend:
    build: ./frontend
    container_name: frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_STREAM_URL: ${VITE_STREAM_URL:-http://localhost:8001/radio.mp3}
    ports:
      - "5500:5500"
    depends_on:
      - backend
